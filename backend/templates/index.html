{% extends 'base.html' %}

{% block content %}
<!-- Main Workspace (Kết quả) -->
<div class="flex-1 flex flex-col items-center justify-center p-8 overflow-hidden relative">
    <div class="absolute inset-0 pointer-events-none flex items-center justify-center opacity-[0.03]">
        <h2 class="font-display-lg text-[12vw] uppercase select-none">KẾT QUẢ</h2>
    </div>
    <div class="relative group cursor-default z-10 w-full max-w-4xl flex flex-col items-center">
        <!-- Empty State (shown before detection) -->
        <div id="result-empty" class="relative w-full aspect-video flex flex-col items-center justify-center rounded-xl border border-border-deep bg-panel-dark/40 backdrop-blur-sm shadow-2xl overflow-hidden">
            <div class="relative z-10 text-center space-y-4 px-12">
                <div class="mb-6 inline-flex items-center justify-center w-20 h-20 rounded-full border-2 border-primary/30 bg-primary/5">
                    <span class="material-symbols-outlined text-4xl text-primary">analytics</span>
                </div>
                <h2 class="font-display-lg text-4xl text-on-surface tracking-tight uppercase">Kết Quả Hệ Thống</h2>
                <p class="font-body-md text-on-surface-variant max-w-lg mx-auto">
                    Tải lên ảnh bảng mạch để bắt đầu quá trình phát hiện.
                    Kết quả sẽ được hiển thị trực tiếp tại khu vực này.
                </p>
                <div class="pt-8 flex flex-wrap justify-center gap-4">
                    <div class="px-4 py-2 bg-viewport-dark/80 border border-border-deep rounded flex items-center gap-3">
                        <span class="font-code-sm text-[10px] text-industrial-gray uppercase">Trạng thái</span>
                        <span id="inference-state" class="font-code-sm text-xs text-secondary font-bold">READY_TO_INFER</span>
                    </div>
                    <div class="px-4 py-2 bg-viewport-dark/80 border border-border-deep rounded flex items-center gap-3">
                        <span class="font-code-sm text-[10px] text-industrial-gray uppercase">VRAM</span>
                        <span class="font-code-sm text-xs text-primary">0.4/8.0 GB</span>
                    </div>
                </div>
            </div>
            <!-- Decorative Corners -->
            <div class="absolute top-4 left-4 w-6 h-6 border-t-2 border-l-2 border-primary/40"></div>
            <div class="absolute top-4 right-4 w-6 h-6 border-t-2 border-r-2 border-primary/40"></div>
            <div class="absolute bottom-4 left-4 w-6 h-6 border-b-2 border-l-2 border-primary/40"></div>
            <div class="absolute bottom-4 right-4 w-6 h-6 border-b-2 border-r-2 border-primary/40"></div>
        </div>

        <!-- Result State (shown after detection) -->
        <div id="result-content" class="hidden w-full flex flex-row gap-4" style="height: calc(100vh - 8rem);">
            <!-- Result Image (left side) -->
            <div class="relative flex-1 min-w-0 rounded-xl border border-border-deep bg-panel-dark/40 backdrop-blur-sm shadow-2xl overflow-hidden flex items-center justify-center">
                <img id="result-image" class="w-full h-full object-contain" src="" alt="Detection result">
                <!-- Decorative Corners -->
                <div class="absolute top-4 left-4 w-6 h-6 border-t-2 border-l-2 border-primary/40"></div>
                <div class="absolute top-4 right-4 w-6 h-6 border-t-2 border-r-2 border-primary/40"></div>
                <div class="absolute bottom-4 left-4 w-6 h-6 border-b-2 border-l-2 border-primary/40"></div>
                <div class="absolute bottom-4 right-4 w-6 h-6 border-b-2 border-r-2 border-primary/40"></div>
            </div>
            <!-- Targets Info (right side) -->
            <div class="w-72 flex-shrink-0 rounded-lg border border-border-deep bg-panel-dark/60 p-4 overflow-y-auto flex flex-col">
                <div class="flex items-center gap-2 mb-3 flex-shrink-0">
                    <span class="material-symbols-outlined text-sm text-primary">list_alt</span>
                    <span class="font-label-caps text-label-caps text-industrial-gray uppercase">Targets</span>
                    <span id="result-count" class="font-code-sm text-xs text-primary font-bold ml-auto">0 found</span>
                </div>
                <div id="result-targets" class="font-code-sm text-code-sm text-on-surface-variant space-y-1 flex-1 overflow-y-auto">
                    <!-- Target items will be injected here -->
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
